# SGLang video-understanding embedding-cache benchmark.
#
# Generate the input files first, for example:
#   python benchmarks/multimodal/jsonl/main.py video-single-turn \
#     --video-manifest /path/to/video_urls.txt \
#     -n 100 --videos-per-request 1 --videos-pool 20 \
#     --user-text-tokens 300 \
#     -o benchmarks/multimodal/jsonl/100req_1vid_20pool_300word_http.jsonl
#
#   python benchmarks/multimodal/jsonl/main.py video-single-turn \
#     --video-manifest /path/to/video_urls.txt \
#     -n 100 --videos-per-request 2 --videos-pool 160 \
#     --user-text-tokens 300 \
#     -o benchmarks/multimodal/jsonl/100req_2vid_160pool_300word_http.jsonl
#
# `videos-pool` has the same meaning as `images-pool`: smaller pool relative
# to request slots gives more cross-request video reuse. For example,
# 100req_1vid_20pool has 100 video slots from 20 unique videos (~80% reuse),
# while 100req_2vid_160pool has 200 video slots from 160 unique videos (~20% reuse).
#
# Then run:
#   python -m benchmarks.multimodal.sweep \
#     --config benchmarks/multimodal/sweep/experiments/embedding_cache/sglang_video_e_pd.yaml

model: Qwen/Qwen3-VL-2B-Instruct
concurrencies: [1, 2, 4, 8]
osl: 128
warmup_count: 2
port: 8000
timeout: 1200
output_dir: benchmarks/multimodal/sweep/results/sglang_video_e_pd

input_files:
  - benchmarks/multimodal/jsonl/100req_1vid_20pool_300word_http.jsonl
  - benchmarks/multimodal/jsonl/100req_1vid_80pool_300word_http.jsonl
  - benchmarks/multimodal/jsonl/100req_2vid_160pool_300word_http.jsonl

configs:
  - label: cache-off
    workflow: examples/backends/sglang/launch/multimodal_epd.sh
    extra_args:
      - --chat-template
      - qwen2-vl
      - --multimodal-embedding-cache-capacity-gb
      - "0"

  - label: cache-on
    workflow: examples/backends/sglang/launch/multimodal_epd.sh
    extra_args:
      - --chat-template
      - qwen2-vl
      - --multimodal-embedding-cache-capacity-gb
      - "10"
