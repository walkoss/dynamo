# NOTE: There is no dedicated `mocker-runtime` image. The published
# `dynamo-planner` image includes the ai-dynamo wheel, ai-dynamo-runtime, and
# planner/profiler dependencies needed by `python3 -m dynamo.mocker`.
# Replace `my-tag` below with the Dynamo release tag you deploy.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: mocker-disagg
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-planner:my-tag
    prefill:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: prefill
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-planner:my-tag
          workingDir: /workspace
          command:
          - python3
          - -m
          - dynamo.mocker
          args:
            - --model-path
            - nvidia/Llama-3.1-8B-Instruct-FP8
            - --model-name
            - nvidia/Llama-3.1-8B-Instruct-FP8
            - --speedup-ratio
            - "1.0"
            - --planner-profile-data
            - /workspace/components/src/dynamo/planner/tests/data/profiling_results/H200_TP1P_TP1D
            - --disaggregation-mode
            - prefill
    decode:
      envFromSecret: hf-token-secret
      componentType: worker
      subComponentType: decode
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-planner:my-tag
          workingDir: /workspace
          command:
          - python3
          - -m
          - dynamo.mocker
          args:
            - --model-path
            - nvidia/Llama-3.1-8B-Instruct-FP8
            - --model-name
            - nvidia/Llama-3.1-8B-Instruct-FP8
            - --speedup-ratio
            - "1.0"
            - --planner-profile-data
            - /workspace/components/src/dynamo/planner/tests/data/profiling_results/H200_TP1P_TP1D
            - --disaggregation-mode
            - decode
