apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: qwen
spec:
  backendFramework: vllm
  components:
  - eppConfig:
      config:
        plugins:
        - type: disagg-profile-handler
        - name: prefill-filter
          parameters:
            allowsNoLabel: false
            label: nvidia.com/dynamo-component-type
            validValues:
            - prefill
          type: label-filter
        - name: decode-filter
          parameters:
            allowsNoLabel: false
            label: nvidia.com/dynamo-component-type
            validValues:
            - decode
          type: label-filter
        - name: picker
          type: max-score-picker
        - name: dyn-prefill
          type: dyn-prefill-scorer
        - name: dyn-decode
          type: dyn-decode-scorer
        schedulingProfiles:
        - name: prefill
          plugins:
          - pluginRef: prefill-filter
            weight: 1
          - pluginRef: dyn-prefill
            weight: 1
          - pluginRef: picker
            weight: 1
        - name: decode
          plugins:
          - pluginRef: decode-filter
            weight: 1
          - pluginRef: dyn-decode
            weight: 1
          - pluginRef: picker
            weight: 1
    name: Epp
    podTemplate:
      spec:
        containers:
        - env:
          - name: DYN_KV_CACHE_BLOCK_SIZE
            value: "16"
          - name: DYN_MODEL_NAME
            value: Qwen/Qwen3-0.6B
          - name: DYN_ENFORCE_DISAGG
            value: "true"
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/epp-image:my-tag
          imagePullPolicy: IfNotPresent
          name: main
    replicas: 1
    type: epp
  - frontendSidecar: sidecar-frontend
    name: VllmDecodeWorker
    podTemplate:
      spec:
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: nvidia.com/dynamo-component-class
                  operator: In
                  values:
                  - worker
              topologyKey: kubernetes.io/hostname
        containers:
        - args:
          - python3 -m dynamo.vllm --model $MODEL_PATH --served-model-name $SERVED_MODEL_NAME
            --tensor-parallel-size 1 --data-parallel-size 1 --disaggregation-mode
            decode --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
            --gpu-memory-utilization 0.90 --block-size 16
          command:
          - /bin/sh
          - -c
          env:
          - name: SERVED_MODEL_NAME
            value: Qwen/Qwen3-0.6B
          - name: MODEL_PATH
            value: Qwen/Qwen3-0.6B
          - name: UCX_TLS
            value: tcp,self
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          imagePullPolicy: IfNotPresent
          name: main
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          workingDir: /workspace/examples/backends/vllm
        - args:
          - -m
          - dynamo.frontend
          - --router-mode
          - direct
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          name: sidecar-frontend
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
    replicas: 1
    sharedMemorySize: 2Gi
    type: decode
  - frontendSidecar: sidecar-frontend
    name: VllmPrefillWorker
    podTemplate:
      spec:
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: nvidia.com/dynamo-component-class
                  operator: In
                  values:
                  - worker
              topologyKey: kubernetes.io/hostname
        containers:
        - args:
          - python3 -m dynamo.vllm --model $MODEL_PATH --served-model-name $SERVED_MODEL_NAME
            --tensor-parallel-size 1 --data-parallel-size 1 --disaggregation-mode
            prefill --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
            --gpu-memory-utilization 0.90 --enable-prefix-caching --block-size 16
            --kv-events-config '{"enable_kv_cache_events":true}'
          command:
          - /bin/sh
          - -c
          env:
          - name: SERVED_MODEL_NAME
            value: Qwen/Qwen3-0.6B
          - name: MODEL_PATH
            value: Qwen/Qwen3-0.6B
          - name: UCX_TLS
            value: tcp,self
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          imagePullPolicy: IfNotPresent
          name: main
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          workingDir: /workspace/examples/backends/vllm
        - args:
          - -m
          - dynamo.frontend
          - --router-mode
          - direct
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:my-tag
          name: sidecar-frontend
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
    replicas: 1
    sharedMemorySize: 2Gi
    type: prefill
