apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: trtllm-v1-disagg-router
spec:
  components:
  - name: Frontend
    podTemplate:
      spec:
        containers:
        - env:
          - name: DYN_ROUTER_MODE
            value: kv
          image: my-registry/tensorrtllm-runtime:my-tag
          name: main
    replicas: 1
    type: frontend
  - name: decode
    podTemplate:
      spec:
        containers:
        - args:
          - --model-path
          - Qwen/Qwen3-0.6B
          - --served-model-name
          - Qwen/Qwen3-0.6B
          - --extra-engine-args
          - ./examples/backends/trtllm/engine_configs/qwen3/decode.yaml
          - --disaggregation-mode
          - decode
          command:
          - python3
          - -m
          - dynamo.trtllm
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: my-registry/tensorrtllm-runtime:my-tag
          name: main
          resources:
            limits:
              nvidia.com/gpu: "1"
          workingDir: /workspace/
    replicas: 2
    type: worker
  - name: prefill
    podTemplate:
      spec:
        containers:
        - args:
          - --model-path
          - Qwen/Qwen3-0.6B
          - --served-model-name
          - Qwen/Qwen3-0.6B
          - --extra-engine-args
          - ./examples/backends/trtllm/engine_configs/qwen3/prefill.yaml
          - --disaggregation-mode
          - prefill
          - --publish-events-and-metrics
          command:
          - python3
          - -m
          - dynamo.trtllm
          envFrom:
          - secretRef:
              name: hf-token-secret
          image: my-registry/tensorrtllm-runtime:my-tag
          name: main
          resources:
            limits:
              nvidia.com/gpu: "1"
          workingDir: /workspace/
    replicas: 2
    type: worker
