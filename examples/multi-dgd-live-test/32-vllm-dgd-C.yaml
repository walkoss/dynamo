#
# vllm-dgd-c — aggregated (non-disagg) TP=2.
#   - 1 decode-only worker pod, TP=2 → 2 GPUs (gpus 6, 7 on $TEST_NODE)
#   - 1 planner pod (AggPlanner) with power-awareness ON
#
# Exercises the AggPlanner annotation path (A3 in the design doc):
#   - AggPlanner has require_prefill=False, require_decode=True
#     (core/adapters.py:99-103)
#   - `_apply_power_annotations` therefore enters the DECODE branch only;
#     PREFILL branch must NOT fire (no VllmPrefillWorker exists)
#   - The DECODE branch patches the aggregated worker pod with
#     decode_engine_gpu_power_limit = 300 W
#
# No prefill worker. No prefill profiling data. The Planner image is the
# same as A and B; the planner discovers AggPlanner vs DisaggPlanner via
# the backend services available in the parent DGD.

apiVersion: v1
kind: ConfigMap
metadata:
  name: dgd-c-planner-profile-data
data:
  # AggPlanner still needs decode profile data; prefill data is unused.
  prefill_raw_data.json: |
    {
      "prefill_isl":          [128, 256, 512, 1024],
      "prefill_ttft":         [12,  18,  30,  55],
      "prefill_thpt_per_gpu": [9800, 8500, 6200, 3800]
    }
  decode_raw_data.json: |
    {
      "x_kv_usage":       [0.1, 0.3, 0.5, 0.7, 0.9],
      "y_context_length": [512, 512, 512, 512, 512],
      "z_itl":            [5, 6, 7, 8, 10],
      "z_thpt_per_gpu":   [4500, 4200, 3800, 3400, 2800],
      "max_kv_tokens": 32768
    }
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: vllm-dgd-c
  labels:
    purpose: power-aware-multi-dgd-test
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
    Planner:
      componentType: planner
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-planner:1.1.1
          command:
            - python3
            - -m
            - dynamo.planner
          args:
            - --config
            # `mode: agg` is REQUIRED — without it, PlannerConfig dispatches
            # DisaggPlanner (core/__main__.py:42) which requires a prefill
            # worker that this DGD doesn't have. AggPlanner sets
            # require_prefill=False, require_decode=True (core/adapters.py:99).
            #
            # prefill knob value is set but ignored by AggPlanner — the
            # planner is responsible for short-circuiting the PREFILL branch
            # (verified live by §8.5 assertion 2).
            - >-
              {"environment": "kubernetes",
               "backend": "vllm",
               "mode": "agg",
               "throughput_adjustment_interval_seconds": 60,
               "profile_results_dir": "/workspace/profiling_results",
               "enable_power_awareness": true,
               "prefill_engine_gpu_power_limit": 375,
               "decode_engine_gpu_power_limit": 300,
               "total_gpu_power_limit": 800,
               "power_agent_safe_default_watts": 280}
          volumeMounts:
            - name: planner-profile-data
              mountPath: /workspace/profiling_results
              readOnly: true
        volumes:
          - name: planner-profile-data
            configMap:
              name: dgd-c-planner-profile-data
    # AggPlanner topology: ONLY a decode worker, no prefill worker.
    # The operator's DGD validator should accept this shape (verified via
    # ycha-snapshot-poc's vllm-agg DGD, which uses an identical pattern).
    VllmDecodeWorker:
      componentType: worker
      subComponentType: decode
      envFromSecret: hf-token-secret
      replicas: 1
      sharedMemory:
        size: 16Gi
      resources:
        limits:
          gpu: "2"
        requests:
          gpu: "2"
      extraPodSpec:
        nodeSelector:
          power-test/node: kaim
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          workingDir: /workspace/examples/backends/vllm
          command: [/bin/sh, -c]
          args:
            - >-
              python3 -m dynamo.vllm
              --model Qwen/Qwen3-0.6B
              --tensor-parallel-size 2
              --gpu-memory-utilization 0.85
