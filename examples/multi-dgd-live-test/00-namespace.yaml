#
# Test namespace for this example. Applying it is a no-op if the namespace
# already exists.
#
# The pull-secret `nvcr-imagepullsecret` (Opaque/dockerconfigjson) is
# expected to be present in this namespace and to cover nvcr.io. Verify:
#   kubectl get secret nvcr-imagepullsecret -n dynamo-power-test
apiVersion: v1
kind: Namespace
metadata:
  name: dynamo-power-test
  labels:
    purpose: power-aware-planner-test
