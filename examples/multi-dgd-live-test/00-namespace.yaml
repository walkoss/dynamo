# Namespace already exists on the cluster (kaim-dynamo-system, 12d old).
# This file is here for completeness — applying it is a no-op if the ns
# already exists.
#
# The pull-secret `nvcr-imagepullsecret` (Opaque/dockerconfigjson) is
# expected to be present in this namespace and to cover nvcr.io. Verify:
#   kubectl get secret nvcr-imagepullsecret -n kaim-dynamo-system
apiVersion: v1
kind: Namespace
metadata:
  name: kaim-dynamo-system
  labels:
    purpose: power-aware-planner-test
