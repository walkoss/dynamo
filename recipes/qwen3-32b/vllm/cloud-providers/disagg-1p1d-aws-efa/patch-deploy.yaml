#
# AWS EFA delta (strategic merge): EFA image on all three pods + the EFA RDMA
# resource on the workers. The image bundles libfabric + the EFA libs, so no
# device hostPath mounts are required. env/args edits live in patch-deploy.json.yaml.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: q32b-1p1d
spec:
  services:
    Frontend:
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1-efa-amd64
    VllmPrefillWorker:
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1-efa-amd64
      resources:
        limits:
          custom:
            vpc.amazonaws.com/efa: "32"
        requests:
          custom:
            vpc.amazonaws.com/efa: "32"
    VllmDecodeWorker:
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1-efa-amd64
      resources:
        limits:
          custom:
            vpc.amazonaws.com/efa: "32"
        requests:
          custom:
            vpc.amazonaws.com/efa: "32"
