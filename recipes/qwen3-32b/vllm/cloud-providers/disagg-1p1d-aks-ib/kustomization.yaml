#
# Azure AKS (A100-SXM4-80GB) — HDR InfiniBand via NIXL UCX.
# Delta vs ../_base: rdma/shared_ib resource (AKS uses the Network Operator's
# *shared* IB device plugin — different key from rdma/ib on Nebius/Nscale),
# /dev/infiniband device mount, GPU tolerations, a frontend ephemeral-storage
# request, explicit UCX kv-transfer, and the UCX/NCCL-IB worker env.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../_base
patches:
- path: patch-deploy.yaml
  target: { group: nvidia.com, version: v1alpha1, kind: DynamoGraphDeployment, name: q32b-1p1d }
- path: patch-deploy.json.yaml
  target: { group: nvidia.com, version: v1alpha1, kind: DynamoGraphDeployment, name: q32b-1p1d }
- path: patch-perf.json.yaml
  target: { version: v1, kind: Pod, name: q32b-1p1d-benchmark }
