#
# GCP GKE A4X (GB200 NVL72) — RoCEv2 over ConnectX-7 via NIXL UCX.
# This is the most divergent variant: GKE Multus RDMA NIC attachment, rack-level
# anti-affinity (NVL72 shares NVLink across a rack, which would short-circuit
# RoCE), arm64 GB200 node selection, the GIB NCCL plugin + driver hostPaths, and
# an nvcr image pull secret. Delta vs ../_base is correspondingly large.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../_base
patches:
- path: patch-deploy.yaml
  target: { group: nvidia.com, version: v1alpha1, kind: DynamoGraphDeployment, name: q32b-1p1d }
- path: patch-deploy.json.yaml
  target: { group: nvidia.com, version: v1alpha1, kind: DynamoGraphDeployment, name: q32b-1p1d }
- path: patch-perf.json.yaml
  target: { version: v1, kind: Pod, name: q32b-1p1d-benchmark }
