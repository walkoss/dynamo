#
# Aggregated Dynamo on a single 8×H100 node, with multimodal
# frontend-decoding AND embedding-cache enabled. Mirrors the
# `dynamo-fd-ec` config in PR 8235's
# benchmarks/multimodal/sweep/experiments/embedding_cache/sweep_397b.yaml:
#   - --enable-multimodal                              MM request handling on
#   - --frontend-decoding                              Frontend decodes images; worker receives embeddings
#   - --multimodal-embedding-cache-capacity-gb 4       4 GiB EC per worker → ~32 GiB CPU total at TP=8
#   - --mm-processor-cache-gb 30                       30 GiB HF processor cache (matches fd & vllm-serve)
#   - --mm-encoder-tp-mode data                        ViT replicated across the 8 GPUs
#   - --tensor-parallel-size 8 --enable-expert-parallel
#   - --dyn-tool-call-parser qwen3_coder --dyn-reasoning-parser qwen3
#
# DGD's operator auto-creates a Service named `qwen35-dynamo-fd-ec-frontend`
# on port 8000 which perf.yaml targets.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen35-dynamo-fd-ec
  labels:
    app.kubernetes.io/name: qwen3.5-397b-fp8
    app.kubernetes.io/component: dynamo-fd-ec
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  pvcs:
    - create: false
      name: shared-model-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /home/dynamo/.cache/huggingface
        - name: DYN_REQUEST_PLANE
          value: tcp
        - name: DYN_HTTP_BODY_LIMIT_MB
          value: "200"
      extraPodSpec:
        # Hostname pin + toleration + image come from hw/${HW}.env
        # (shared across vllm-serve, dynamo-fd, dynamo-fd-ec). Both
        # Frontend and VllmWorker get the same nodeSelector so the
        # gang scheduler places both on that exact 8×H100 node.
        # If the pinned host has no free GPUs at apply time, both pods
        # stay Pending — edit hw/${HW}.env to retarget.
        nodeSelector: ${HW_NODE_SELECTOR}
        tolerations: ${HW_TOLERATIONS}
        mainContainer:
          image: ${VLLM_IMAGE}
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
      replicas: 1
      resources:
        requests:
          cpu: "8"
          memory: 32Gi
        limits:
          cpu: "16"
          memory: 64Gi
      subComponentType: null

    VllmWorker:
      componentType: worker
      extraPodSpec:
        # Same hostname pin as Frontend — keeps the NIXL embedding
        # transfer a same-node memcpy.
        nodeSelector: ${HW_NODE_SELECTOR}
        tolerations: ${HW_TOLERATIONS}
        mainContainer:
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              ulimit -l unlimited
              python3 -m dynamo.vllm \
                --model "${MODEL_NAME}" \
                --enable-multimodal \
                --frontend-decoding \
                --multimodal-embedding-cache-capacity-gb "${DYN_MULTIMODAL_EMBEDDING_CACHE_GB}" \
                --mm-processor-cache-gb 30 \
                --mm-encoder-tp-mode data \
                --dyn-tool-call-parser qwen3_coder \
                --dyn-reasoning-parser qwen3 \
                --tensor-parallel-size 8 \
                --enable-expert-parallel \
                --gpu-memory-utilization 0.85 \
                --max-model-len 32768 \
                --enable-prefix-caching \
                --no-enable-log-requests
          image: ${VLLM_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: MODEL_NAME
              value: "Qwen/Qwen3.5-397B-A17B-FP8"
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: DYN_REQUEST_PLANE
              value: tcp
            # nixl-write is the EC connector's transfer mode for the
            # post-encoder embeddings between workers (matters at TP>1
            # — at TP=8 it's the right choice).
            - name: DYN_VLLM_EMBEDDING_TRANSFER_MODE
              value: nixl-write
            # 4 GiB embedding cache per worker × 8 workers (TP=8) =
            # ~32 GiB CPU total — matches PR 8235's sweep_397b.yaml.
            - name: DYN_MULTIMODAL_EMBEDDING_CACHE_GB
              value: "4"
            - name: DYN_MM_ALLOW_INTERNAL
              value: "1"
            - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
              value: "1800"
            - name: NCCL_TIMEOUT
              value: "1800"
          workingDir: /workspace
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
      replicas: 1
      resources:
        limits:
          gpu: "8"
        requests:
          gpu: "8"
      subComponentType: null
      volumeMounts:
        - name: shared-model-cache
          mountPoint: /home/dynamo/.cache/huggingface
          # Same shared FSx HF cache as vllm-serve. No subPath →
          # benefit from already-downloaded weights. vLLM compilation
          # cache is NOT persisted here (single PVC, single mount point
          # in DGD's volumeMounts grammar); we eat the torch.compile +
          # DeepGEMM JIT penalty per pod restart. Acceptable for bench
          # runs that stay up for the entire sweep.
