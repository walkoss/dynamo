#
# Generate 30u_3t_5w_8000word_base64.jsonl into /perf-cache/datasets/.
# Sliding-window: 30 users × 3 turns × window=5 = 90 requests over 7
# unique images per user (window + turns - 1 = 5 + 3 - 1 = 7), so 210
# total images; 8000 text tokens per request, 2400x1080 base64-inlined.
# Each row has session_id=user_<N> so aiperf can issue same-user turns
# in causal order (requires aiperf PR 824).
#
# Matches PR 8235's sweep_397b.yaml shape (8K ISL × 5 images per turn ×
# 1K OSL × conc=30, 3 turns per user): turn-1 is a cold-cache baseline,
# turns 2-3 each reuse 4-of-5 images from the prior turn. The modest
# turn count keeps the warm-request fraction at 2/3, so the benchmark
# reflects fresh-image preprocessing cost rather than a cache-saturated
# steady state (8-turn pushes warm-fraction to 7/8 and lets the
# baseline's processor/prefix caches mask the frontend-decoding win).
apiVersion: batch/v1
kind: Job
metadata:
  name: qwen35-generate-datasets
  labels:
    app.kubernetes.io/name: qwen3.5-397b-fp8
    app.kubernetes.io/component: data-gen
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen3.5-397b-fp8
        app.kubernetes.io/component: data-gen
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: generate-datasets
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            # vllm-runtime:1.2.0 may still ship a baked
            # /workspace/benchmarks/multimodal/jsonl/main.py older than
            # dynamo PR 8201 (sliding-window strategy). To stay independent
            # of the image's bundled copy, we always pull a pinned main
            # SHA of main.py into the pod. Bump DYNAMO_REF when you want
            # newer generator fixes; drop the pin entirely once 1.2.x+
            # is confirmed to include the sliding-window subcommand.
            - name: DYNAMO_REF
              value: "dd298d6006545d1c5a676f03b7d774e3b9590bee"
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              GEN_SRC=/tmp/dynamo-jsonl
              rm -rf "$GEN_SRC"
              # Shallow fetch a specific SHA (or ref). `git clone --branch`
              # doesn't accept SHAs, so use init + fetch <sha> + checkout
              # — works for both SHAs and branch names.
              git init -q "$GEN_SRC"
              git -C "$GEN_SRC" remote add origin https://github.com/ai-dynamo/dynamo.git
              git -C "$GEN_SRC" fetch --depth=1 origin "$DYNAMO_REF"
              git -C "$GEN_SRC" checkout -q FETCH_HEAD
              cd "$GEN_SRC/benchmarks/multimodal/jsonl"
              echo "[gen] using dynamo @ $(git -C $GEN_SRC rev-parse --short HEAD)"
              python3 main.py --help | head -3
              OUTPUT_DIR="/perf-cache/datasets"
              IMAGE_DIR="/perf-cache/images/2400x1080"
              mkdir -p "${OUTPUT_DIR}" "${IMAGE_DIR}"
              python3 main.py sliding-window \
                --num-users 30 \
                --turns-per-user 3 \
                --window-size 5 \
                --image-size 2400 1080 \
                --image-mode base64 \
                --image-dir "${IMAGE_DIR}" \
                --user-text-tokens 8000 \
                -o "${OUTPUT_DIR}/30u_3t_5w_8000word_base64.jsonl"
              ls -lh "${OUTPUT_DIR}/30u_3t_5w_8000word_base64.jsonl"
              echo "Dataset generation complete in ${OUTPUT_DIR}"
          volumeMounts:
            - name: shared-model-cache
              mountPath: /perf-cache
              # Per-recipe subdir so different recipes don't collide on
              # /perf-cache/datasets and /perf-cache/images.
              subPath: qwen35-bench/perf-cache
      volumes:
        - name: shared-model-cache
          persistentVolumeClaim:
            claimName: shared-model-cache
