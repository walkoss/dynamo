#
# aiperf benchmark pod for the dynamo-fd (frontend-decoding, no EC)
# config. Identical to dynamo-fd-ec/perf.yaml except FRONTEND service
# name, RUN_DIR run-label, and pod metadata.
apiVersion: v1
kind: Pod
metadata:
  name: qwen35-fd-bench
  labels:
    app.kubernetes.io/name: qwen3.5-397b-fp8
    app.kubernetes.io/component: dynamo-fd-benchmark
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  restartPolicy: Never
  # Hostname pin + toleration come from hw/${HW}.env — same target as
  # the DGD's Frontend + VllmWorker.
  nodeSelector: ${HW_NODE_SELECTOR}
  tolerations: ${HW_TOLERATIONS}
  # Belt-and-suspenders podAffinity to the Frontend (no-op given the
  # hostname pin). Label key reference: the dynamo operator auto-stamps
  # every DGD pod with `nvidia.com/dynamo-graph-deployment-name: <name>`
  # and `nvidia.com/dynamo-component-type: <componentType>`. Do NOT
  # match on `app.kubernetes.io/name` — the operator overwrites that.
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              nvidia.com/dynamo-graph-deployment-name: qwen35-dynamo-fd
              nvidia.com/dynamo-component-type: frontend
          topologyKey: kubernetes.io/hostname
  containers:
    - name: benchmark
      image: python:3.11
      command:
        - /bin/bash
        - -lc
        - |
          set -euo pipefail
          ulimit -n 1048576
          ulimit -u 65536

          apt update && apt install -y --no-install-recommends curl jq git

          # Pin to a recent aiperf main SHA that includes PR 824
          # (session_id for single-turn) + PR 903 (HF image-byte-dict fix).
          pip install --no-cache-dir "aiperf @ git+https://github.com/ai-dynamo/aiperf.git@${AIPERF_GIT_REF}"
          python -c "import aiperf, sys; print('aiperf', aiperf.__version__ if hasattr(aiperf,'__version__') else 'sha-pinned', 'OK')"

          echo "Waiting for model '${MODEL_NAME}' at http://${FRONTEND}:8000/v1/models ..."
          until curl -s "http://${FRONTEND}:8000/v1/models" \
              | jq -e --arg m "${MODEL_NAME}" '.data[]? | select(.id == $m)' >/dev/null 2>&1; do
            echo "[$(date '+%H:%M:%S')] not ready, sleeping 15s"
            sleep 15
          done
          echo "Model '${MODEL_NAME}' is ready."

          INPUT_FILE="${DATASET_DIR}/30u_8t_5w_8000word_base64.jsonl"
          if [[ ! -f "${INPUT_FILE}" ]]; then
            echo "Dataset not found: ${INPUT_FILE}" >&2
            exit 1
          fi

          RUN_DIR="${ARTIFACT_BASE_DIR}/dynamo-fd"
          mkdir -p "${RUN_DIR}"
          echo "Running benchmark; artifacts → ${RUN_DIR}"

          aiperf profile \
            --model "${MODEL_NAME}" \
            --input-file "${INPUT_FILE}" \
            --custom-dataset-type single_turn \
            --url "http://${FRONTEND}:8000" \
            --streaming \
            --ui-type none \
            --request-count "${REQUEST_COUNT}" \
            --concurrency "${CONCURRENCY}" \
            --request-rate-mode constant \
            --warmup-request-count "${WARMUP_REQUEST_COUNT}" \
            --artifact-dir "${RUN_DIR}" \
            --extra-inputs "max_tokens:${MAX_TOKENS}" \
            --extra-inputs "min_tokens:${MAX_TOKENS}" \
            --extra-inputs "ignore_eos:true"

          if [[ "${KEEP_INPUTS_JSON:-}" != "1" ]]; then
            rm -fv "${RUN_DIR}/inputs.json" || true
          else
            echo "KEEP_INPUTS_JSON=1 → retaining $(du -sh ${RUN_DIR}/inputs.json 2>/dev/null | cut -f1) inputs.json"
          fi

          echo "Run complete. Artifacts in ${RUN_DIR}"
          sleep 3600
      env:
        - name: MODEL_NAME
          value: Qwen/Qwen3.5-397B-A17B-FP8
        - name: FRONTEND
          value: qwen35-dynamo-fd-frontend
        - name: AIPERF_GIT_REF
          value: "79de74ece808"
        - name: MAX_TOKENS
          value: "1024"
        - name: REQUEST_COUNT
          value: "240"  # 30 users × 8 turns
        - name: CONCURRENCY
          value: "30"
        - name: WARMUP_REQUEST_COUNT
          value: "2"
        - name: DATASET_DIR
          value: /perf-cache/datasets
        - name: ARTIFACT_BASE_DIR
          value: /perf-cache/artifacts/qwen35_fp8
        - name: AIPERF_DATASET_CONFIGURATION_TIMEOUT
          value: "1800"
        - name: AIPERF_SERVICE_PROFILE_CONFIGURE_TIMEOUT
          value: "1800"
      resources:
        requests:
          cpu: "8"
          memory: 16Gi
        limits:
          cpu: "16"
          memory: 32Gi
      volumeMounts:
        - name: shared-model-cache
          mountPath: /perf-cache
          subPath: qwen35-bench/perf-cache
  volumes:
    - name: shared-model-cache
      persistentVolumeClaim:
        claimName: shared-model-cache
