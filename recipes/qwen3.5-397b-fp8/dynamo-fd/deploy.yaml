#
# Aggregated Dynamo on a single 8×H100 node with **frontend-decoding ON**,
# **embedding cache OFF** — isolates the frontend-decoding effect from
# the EC effect when compared against:
#   - vllm-serve/  : baseline (no Dynamo features)
#   - dynamo-fd-ec : Dynamo + frontend-decoding + EC
#
# Mirrors the `dynamo-fd` config in PR 8235's
# benchmarks/multimodal/sweep/experiments/embedding_cache/sweep_397b.yaml
# (TP=8, expert-parallel, mm-encoder-tp data, max-model-len=32K). The
# only deliberate divergence from PR 8235 is `--mm-processor-cache-gb 30`
# instead of 60 — see comment block below.
#
# Per-config flag diff (kept symmetric so only EC capacity differs):
#                                              fd        fd-ec        vllm-serve
#   --tensor-parallel-size                       8         8            8
#   --enable-expert-parallel                    yes       yes          yes
#   --mm-encoder-tp-mode                        data      data         data
#   --mm-processor-cache-gb                      30        30           30
#   --max-model-len                             32768     32768        32768
#   --frontend-decoding                         yes       yes          n/a
#   --multimodal-embedding-cache-capacity-gb     --        4            n/a
#
# PR 8235's 397B yaml uses 60 GB processor cache on fd and 30 GB on
# fd-ec — different sizes. Vision-sweep skill guidance is to match the
# processor cache across configs so the only flag that differs between
# fd and fd-ec is the EC capacity. We follow vision-sweep.
#
# Frontend + VllmWorker are both pinned to the same host via
# hw/${HW}.env so the gang scheduler places them on one 8×H100 node.
# That keeps the request-plane RPC and (future) NIXL embedding transfer
# intra-node.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen35-dynamo-fd
  labels:
    app.kubernetes.io/name: qwen3.5-397b-fp8
    app.kubernetes.io/component: dynamo-fd
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  pvcs:
    - create: false
      name: shared-model-cache
  services:
    Frontend:
      componentType: frontend
      envs:
        - name: HF_HOME
          value: /home/dynamo/.cache/huggingface
        - name: DYN_REQUEST_PLANE
          value: tcp
        # Multimodal bodies are 5×2400x1080 base64-inlined images per
        # request; default 50 MiB body limit will reject them. 200 MiB
        # is the same value PR 8235's sweep_397b.yaml sets.
        - name: DYN_HTTP_BODY_LIMIT_MB
          value: "200"
      extraPodSpec:
        nodeSelector: ${HW_NODE_SELECTOR}
        tolerations: ${HW_TOLERATIONS}
        mainContainer:
          image: ${VLLM_IMAGE}
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
      # Frontend-decoding does CPU-side base64-decode + image-preprocess,
      # so give it more CPU than the qwen3.6 recipe's cpu=4 — these
      # requests are heavier (5 images per turn).
      replicas: 1
      resources:
        requests:
          cpu: "8"
          memory: 32Gi
        limits:
          cpu: "16"
          memory: 64Gi
      subComponentType: null

    VllmWorker:
      componentType: worker
      extraPodSpec:
        # Same hostname pin as Frontend — kai-scheduler gang-schedules
        # both pods atomically; pinning both to one host is the only
        # reliable way to land them on the same node (inter-pod
        # podAffinity deadlocks under gang scheduling; preferred
        # podAffinity is a no-op at decision time).
        nodeSelector: ${HW_NODE_SELECTOR}
        tolerations: ${HW_TOLERATIONS}
        mainContainer:
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              ulimit -l unlimited
              python3 -m dynamo.vllm \
                --model "${MODEL_NAME}" \
                --enable-multimodal \
                --frontend-decoding \
                --mm-processor-cache-gb 30 \
                --mm-encoder-tp-mode data \
                --dyn-tool-call-parser qwen3_coder \
                --dyn-reasoning-parser qwen3 \
                --tensor-parallel-size 8 \
                --enable-expert-parallel \
                --gpu-memory-utilization 0.85 \
                --max-model-len 32768 \
                --enable-prefix-caching \
                --no-enable-log-requests
          image: ${VLLM_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: MODEL_NAME
              value: "Qwen/Qwen3.5-397B-A17B-FP8"
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: DYN_REQUEST_PLANE
              value: tcp
            # DYN_VLLM_EMBEDDING_TRANSFER_MODE / DYN_MULTIMODAL_EMBEDDING_CACHE_GB
            # intentionally omitted — no embedding cache in this config.
            - name: DYN_MM_ALLOW_INTERNAL
              value: "1"
            # Relax NCCL watchdog — DeepGEMM JIT + cudagraph capture for
            # 397B at TP=8 can stall NCCL ops longer than the default
            # heartbeat. Same values PR 8235 uses.
            - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
              value: "1800"
            - name: NCCL_TIMEOUT
              value: "1800"
          workingDir: /workspace
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
      replicas: 1
      resources:
        limits:
          gpu: "8"
        requests:
          gpu: "8"
      subComponentType: null
      volumeMounts:
        - name: shared-model-cache
          mountPoint: /home/dynamo/.cache/huggingface
