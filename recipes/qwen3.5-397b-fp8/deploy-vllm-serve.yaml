#
# vllm serve baseline — no Dynamo components. Mounts the namespace's
# `shared-model-cache` PVC (RWX, e.g. FSx Lustre) at HF_HOME so the HF
# Hub cache is shared across all configs in the namespace, AND at a
# subPath for the per-model vllm compilation cache.
#
# 8×H100 single-node TP=8 deployment. Flags mirror the `vllm-serve`
# config in PR 8235's 397B sweep (TP=8, expert-parallel, mm-encoder-tp
# data, max-model-len=32K) with `--mm-processor-cache-gb 30` matched
# to dynamo-fd so the only flag that differs between the two configs
# is frontend-decoding itself.
---
apiVersion: v1
kind: Service
metadata:
  name: qwen35-vllm-serve
  labels:
    app.kubernetes.io/name: qwen3.5-397b-fp8
    app.kubernetes.io/component: vllm-serve
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: qwen3.5-397b-fp8
    app.kubernetes.io/component: vllm-serve
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen35-vllm-serve
  labels:
    app.kubernetes.io/name: qwen3.5-397b-fp8
    app.kubernetes.io/component: vllm-serve
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  replicas: 1
  # First-time bootstrap = image pull + model load 400 GiB FP8 from FSx
  # (~10-20 min) + torch.compile + cudagraph capture (~5-10 min) + DeepGEMM
  # JIT warmup. K8s default progressDeadlineSeconds=600s is far too short.
  # Bump to 45 min.
  progressDeadlineSeconds: 2700
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen3.5-397b-fp8
      app.kubernetes.io/component: vllm-serve
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen3.5-397b-fp8
        app.kubernetes.io/component: vllm-serve
        app.kubernetes.io/managed-by: dynamo-recipe
    spec:
      restartPolicy: Always
      # Hostname pin + image come from hw/${HW}.env (sibling to this
      # recipe's vllm-serve/ dir). All three configs share that file so
      # they land on the same node and benchmark on identical hardware.
      nodeSelector: ${HW_NODE_SELECTOR}
      tolerations: ${HW_TOLERATIONS}
      securityContext:
        runAsUser: 0
      containers:
        - name: vllm
          image: ${VLLM_IMAGE}
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              ulimit -l unlimited
              exec vllm serve "${MODEL_NAME}" \
                --host 0.0.0.0 \
                --port 8000 \
                --tensor-parallel-size 8 \
                --enable-expert-parallel \
                --gpu-memory-utilization 0.85 \
                --max-model-len 32768 \
                --mm-encoder-tp-mode data \
                --mm-processor-cache-gb 30 \
                --enable-prefix-caching \
                --enable-auto-tool-choice \
                --tool-call-parser qwen3_coder \
                --reasoning-parser qwen3 \
                --no-enable-log-requests
          env:
            - name: MODEL_NAME
              value: "Qwen/Qwen3.5-397B-A17B-FP8"
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: VLLM_CACHE_ROOT
              value: /home/dynamo/.cache/vllm
            - name: HF_HUB_OFFLINE
              value: "1"
            # NCCL watchdog: 397B at TP=8 over NVLink is fast, but the
            # first cudagraph capture pass occasionally hits multi-minute
            # stalls when DeepGEMM is JIT-compiling on the same GPUs.
            # Relax so we don't get a spurious watchdog SIGABRT.
            - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
              value: "1800"
            - name: NCCL_TIMEOUT
              value: "1800"
          # Qwen3.5-397B-A17B-FP8 is a public model — vllm serve doesn't
          # need an HF token to load it. HF_HUB_OFFLINE=1 above
          # short-circuits any hub lookups at runtime. Uncomment when
          # swapping in a gated model.
          # envFrom:
          #   - secretRef:
          #       name: hf-token-secret
          #       optional: true
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 120
          resources:
            requests:
              cpu: "32"
              memory: 256Gi
              nvidia.com/gpu: "8"
            limits:
              cpu: "64"
              memory: 512Gi
              nvidia.com/gpu: "8"
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
          volumeMounts:
            - name: shared-model-cache
              mountPath: /home/dynamo/.cache/huggingface
              # No subPath — share the HF cache root with the namespace
              # so already-downloaded models are reused, and our
              # Qwen3.5-397B download appears under the standard
              # `hub/models--Qwen--Qwen3.5-397B-A17B-FP8/` layout.
            - name: shared-model-cache
              mountPath: /home/dynamo/.cache/vllm
              subPath: qwen35-bench/vllm-cache
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shared-model-cache
          persistentVolumeClaim:
            claimName: shared-model-cache
        - name: shm
          emptyDir:
            medium: Memory
            # 8-way TP with NCCL + multimodal request bodies — bump shm
            # well above the qwen3.6 single-GPU recipe's 40Gi.
            sizeLimit: 160Gi
