#
# Some clusters pre-provision a `shared-model-cache` PVC (e.g. FSx
# Lustre, RWX, statically bound). When present, the recipe mounts it
# directly — applying this file is a no-op.
#
# For clusters WITHOUT a pre-provisioned shared-model-cache, uncomment
# the PVC below. Prefer an RWX/Retain class (e.g. FSx Lustre) over
# RWO/Delete (e.g. EBS) — RWO EBS volumes get pinned to whichever AZ
# the first-consumer pod schedules into, leaving the GPU pod
# unschedulable if your GPU nodes live in a different AZ.
#
# Sizing: Qwen3.5-397B-A17B-FP8 weights are ~400 GiB. Bump `storage:`
# to ≥600 GiB to leave headroom for the vllm compilation cache and
# generated datasets.
#
# ---
# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: shared-model-cache
#   labels:
#     app.kubernetes.io/name: qwen3.5-397b-fp8
#     app.kubernetes.io/component: model-cache
#     app.kubernetes.io/managed-by: dynamo-recipe
# spec:
#   accessModes:
#     - ReadWriteMany
#   resources:
#     requests:
#       storage: 600Gi
#   storageClassName: <your-rwx-storage-class>  # e.g. dgxc-enterprise-file
