#
# Download Qwen/Qwen3.5-122B-A10B weights into the shared-model-cache PVC
# so all deploy configs share the HF Hub cache layout.
apiVersion: batch/v1
kind: Job
metadata:
  name: qwen35-122b-model-download
  labels:
    app.kubernetes.io/name: qwen3.5-122b-a10b
    app.kubernetes.io/component: model-download
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen3.5-122b-a10b
        app.kubernetes.io/component: model-download
    spec:
      restartPolicy: Never
      containers:
        - name: model-download
          image: python:3.10-slim
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command: ["sh", "-c"]
          env:
            - name: MODEL_NAME
              value: "Qwen/Qwen3.5-122B-A10B"
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: HF_XET_HIGH_PERFORMANCE
              value: "1"
            - name: MODEL_REVISION
              value: "main"
          envFrom:
            - secretRef:
                name: hf-token-secret
                optional: true
          args:
            - |
              set -eux
              pip install --no-cache-dir huggingface_hub==1.11.0
              python3 -c "import os; from huggingface_hub import snapshot_download; snapshot_download(repo_id=os.environ['MODEL_NAME'], revision=os.environ['MODEL_REVISION']); print('Download complete')"
          resources:
            requests:
              cpu: "2"
              memory: "64Gi"
            limits:
              cpu: "8"
              memory: "64Gi"
          volumeMounts:
            - name: shared-model-cache
              mountPath: /home/dynamo/.cache/huggingface
      volumes:
        - name: shared-model-cache
          persistentVolumeClaim:
            claimName: shared-model-cache
