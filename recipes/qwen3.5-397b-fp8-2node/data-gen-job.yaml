#
# Generate 30u_8t_5w_8000word_base64.jsonl into /perf-cache/datasets/.
# Sliding-window: 30 users × 8 turns × window=5 = 240 requests over 12
# unique images per user (window + turns - 1 = 5 + 8 - 1 = 12), so 360
# total images; 8000 text tokens per request, 2400x1080 base64-inlined.
# Each row has session_id=user_<N> so aiperf can issue same-user turns
# in causal order (requires aiperf PR 824), AND the KV router on the
# Dynamo 2-node config uses that session continuity to bias toward
# the worker that already cached the user's prefix.
apiVersion: batch/v1
kind: Job
metadata:
  name: qwen397-generate-datasets
  labels:
    app.kubernetes.io/name: qwen3.5-397b-fp8-2node
    app.kubernetes.io/component: data-gen
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen3.5-397b-fp8-2node
        app.kubernetes.io/component: data-gen
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: generate-datasets
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            # nvcr.io/.../vllm-runtime:1.1.x was cut from a release branch
            # that predates dynamo PR 8201 (sliding-window strategy), so
            # the baked /workspace/benchmarks/multimodal/jsonl/main.py is
            # the older single-turn-only version. Pull a pinned main SHA
            # to get the sliding-window subcommand. Bump DYNAMO_REF when
            # you want newer generator fixes.
            - name: DYNAMO_REF
              value: "e2f63d01e07b6deadf4c0912269564503846d204"
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              GEN_SRC=/tmp/dynamo-jsonl
              rm -rf "$GEN_SRC"
              git init -q "$GEN_SRC"
              git -C "$GEN_SRC" remote add origin https://github.com/ai-dynamo/dynamo.git
              git -C "$GEN_SRC" fetch --depth=1 origin "$DYNAMO_REF"
              git -C "$GEN_SRC" checkout -q FETCH_HEAD
              cd "$GEN_SRC/benchmarks/multimodal/jsonl"
              echo "[gen] using dynamo @ $(git -C $GEN_SRC rev-parse --short HEAD)"
              python3 main.py --help | head -3
              OUTPUT_DIR="/perf-cache/datasets"
              IMAGE_DIR="/perf-cache/images/2400x1080"
              mkdir -p "${OUTPUT_DIR}" "${IMAGE_DIR}"
              python3 main.py sliding-window \
                --num-users 30 \
                --turns-per-user 8 \
                --window-size 5 \
                --image-size 2400 1080 \
                --image-mode base64 \
                --image-dir "${IMAGE_DIR}" \
                --user-text-tokens 8000 \
                -o "${OUTPUT_DIR}/30u_8t_5w_8000word_base64.jsonl"
              ls -lh "${OUTPUT_DIR}/30u_8t_5w_8000word_base64.jsonl"
              echo "Dataset generation complete in ${OUTPUT_DIR}"
          volumeMounts:
            - name: shared-model-cache
              mountPath: /perf-cache
              # Per-recipe subdir so different recipes don't collide on
              # /perf-cache/datasets and /perf-cache/images.
              subPath: qiwa-qwen397-2node/perf-cache
      volumes:
        - name: shared-model-cache
          persistentVolumeClaim:
            claimName: shared-model-cache
