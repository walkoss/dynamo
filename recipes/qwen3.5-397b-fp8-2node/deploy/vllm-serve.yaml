#
# vllm serve baseline for Qwen3.5-397B-A17B-FP8 — single-node TP=8, no
# Dynamo. Used as the apples-to-comparison point for deploy/dynamo.yaml
# (which runs 2 workers across 2 nodes behind a KV router).
#
# Pinned to one specific H100 hostname via hw/${HW}.env. Picking a node
# that won't conflict with the 2-node Dynamo deploy is the user's
# job — see README.md → "Capacity precheck".
---
apiVersion: v1
kind: Service
metadata:
  name: qwen397-vllm-serve
  labels:
    app.kubernetes.io/name: qwen3.5-397b-fp8-2node
    app.kubernetes.io/component: vllm-serve
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: qwen3.5-397b-fp8-2node
    app.kubernetes.io/component: vllm-serve
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen397-vllm-serve
  labels:
    app.kubernetes.io/name: qwen3.5-397b-fp8-2node
    app.kubernetes.io/component: vllm-serve
    app.kubernetes.io/managed-by: dynamo-recipe
spec:
  replicas: 1
  # First-time bootstrap on 397B FP8 = image pull (~3 min) + 400 GB
  # model load from FSx (~10-15 min, even with HF_XET_HIGH_PERFORMANCE)
  # + torch.compile + cudagraph capture (~3-5 min) ≈ 18-25 min. K8s
  # default of 600s declares the rollout failed at 10 min even though
  # the pod is healthy and still booting. Bump to 30 min.
  progressDeadlineSeconds: 1800
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen3.5-397b-fp8-2node
      app.kubernetes.io/component: vllm-serve
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen3.5-397b-fp8-2node
        app.kubernetes.io/component: vllm-serve
        app.kubernetes.io/managed-by: dynamo-recipe
    spec:
      restartPolicy: Always
      # vllm-serve uses a hostname pin (NOT the GPU-product label that
      # the 2-node Dynamo config uses) so the user can deliberately put
      # the baseline on a chosen node and keep the 2 Dynamo workers
      # elsewhere. ${HW_NODE_SELECTOR} resolves from hw/${HW}.env.
      nodeSelector: ${HW_NODE_SELECTOR_VLLM_SERVE}
      tolerations: ${HW_TOLERATIONS}
      securityContext:
        runAsUser: 0
      containers:
        - name: vllm
          image: ${VLLM_IMAGE}
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              ulimit -l unlimited
              exec vllm serve "${MODEL_NAME}" \
                --host 0.0.0.0 \
                --port 8000 \
                --tensor-parallel-size 8 \
                --gpu-memory-utilization 0.85 \
                --max-model-len 32768 \
                --mm-processor-cache-gb 30 \
                --enable-prefix-caching \
                --no-enable-log-requests
          env:
            - name: MODEL_NAME
              value: "Qwen/Qwen3.5-397B-A17B-FP8"
            - name: HF_HOME
              value: /home/dynamo/.cache/huggingface
            - name: VLLM_CACHE_ROOT
              value: /home/dynamo/.cache/vllm
            - name: HF_HUB_OFFLINE
              value: "1"
          # Qwen3.5-397B-A17B-FP8 is a public model — no HF token
          # needed. Uncomment when swapping in a gated model.
          # envFrom:
          #   - secretRef:
          #       name: hf-token-secret
          #       optional: true
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 120
          resources:
            requests:
              cpu: "16"
              memory: 256Gi
              nvidia.com/gpu: "8"
            limits:
              cpu: "32"
              memory: 512Gi
              nvidia.com/gpu: "8"
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
          volumeMounts:
            - name: shared-model-cache
              mountPath: /home/dynamo/.cache/huggingface
              # No subPath — share the HF cache root with the namespace
              # so already-downloaded models are reused, and our 397B
              # download lands under the standard hub/models--Qwen--
              # Qwen3.5-397B-A17B-FP8/ layout.
            - name: shared-model-cache
              mountPath: /home/dynamo/.cache/vllm
              subPath: qiwa-qwen397-2node/vllm-cache
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shared-model-cache
          persistentVolumeClaim:
            claimName: shared-model-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 80Gi
