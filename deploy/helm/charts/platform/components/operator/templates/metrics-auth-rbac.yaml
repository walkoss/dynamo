# Grants the operator delegated-auth permissions (TokenReview + SubjectAccessReview)
# required by controller-runtime's WithAuthenticationAndAuthorization metrics filter
# (cmd/main.go FilterProvider). These are cluster-scoped resources that cannot be
# granted via a namespace-scoped Role, so they are always provided as a dedicated
# ClusterRole regardless of namespace-restriction mode.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dynamo-operator.fullname" . }}-{{ .Release.Namespace }}-metrics-auth
  labels:
    app.kubernetes.io/component: metrics
    app.kubernetes.io/created-by: dynamo-operator
    app.kubernetes.io/part-of: dynamo-operator
    {{- include "dynamo-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dynamo-operator.fullname" . }}-{{ .Release.Namespace }}-metrics-auth
  labels:
    app.kubernetes.io/component: metrics
    app.kubernetes.io/created-by: dynamo-operator
    app.kubernetes.io/part-of: dynamo-operator
    {{- include "dynamo-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dynamo-operator.fullname" . }}-{{ .Release.Namespace }}-metrics-auth
subjects:
- kind: ServiceAccount
  name: {{ include "dynamo-operator.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
