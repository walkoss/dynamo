family: harmony
model_label: gpt-oss
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (basic complete envelope)
    ref: "OpenAI Harmony receiving tool calls: https://developers.openai.com/cookbook/articles/openai-harmony#receiving-tool-calls"
    model_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_1
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *d_1
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|>
        reason: "Less spec-correct parsing: SGLang leaks raw Harmony markup instead of extracting a valid '<|call|>'-terminated commentary tool call."
  PARSER.batch.3:
    description: No tool call (bare text without final channel)
    ref: "OpenAI Harmony channels/final output: https://developers.openai.com/cookbook/articles/openai-harmony#channels"
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      dynamo: &d_3
        calls: []
        normal_text: ''
      vllm: *d_3
      sglang:
        calls: []
        normal_text: Hello, how can I help you today?
        reason: "Less spec-correct fallback: bare text is not a valid Harmony assistant response because no final message was emitted. A valid response would be '<|channel|>final<|message|>Hello, how can I help you today?<|return|>'."
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id001
    expected:
      dynamo: &d_9
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: ''
      sglang: *d_9
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|><|start|>assistant<|channel|>commentary
      to=functions.get_weather <|constrain|>json<|message|>{"location":"LA"}<|call|>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: ''
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: ''
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: ''
  PARSER.batch.11:
    description: Separator-character case — n/a for this family's syntax
    reason: |-
      PARSER.batch.11 targets delimiter-separated parser formats. harmony uses channel/recipient/message envelope tokens plus a JSON payload rather than delimiter-splitting multiple calls with an in-band separator, so this separator-state regression has no separate grammar surface here.
  PARSER.batch.12:
    description: Multi-call separator-character case — n/a for this family's syntax
    reason: |-
      PARSER.batch.11 targets delimiter-separated parser formats. harmony uses channel/recipient/message envelope tokens plus a JSON payload rather than delimiter-splitting multiple calls with an in-band separator, so this separator-state regression has no separate grammar surface here. PARSER.batch.12 is the multi-call version of the same separator-state check, so the same applicability rule applies.
  PARSER.batch.13:
    description: Unknown tool name absent from supplied tools
    ref: dynamo
    model_text: <|channel|>commentary to=functions.unknown_tool <|constrain|>json<|message|>{"location":"NYC"}<|call|>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.unknown_tool <|constrain|>json<|message|>{"location":"NYC"}<|call|>
        reason: SGLang treats an unknown harmony recipient as ordinary content rather than forwarding a tool call by default.
