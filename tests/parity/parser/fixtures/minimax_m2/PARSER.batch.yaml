family: minimax_m2
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      normal_text: ''
  PARSER.batch.2:
    description: Multiple tool calls
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      <invoke name="get_time">
      <parameter name="timezone">EST</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id001
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_time
        arguments:
          timezone: EST
      normal_text: ''
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      calls: []
      normal_text: Hello, how can I help you today?
  PARSER.batch.4:
    description: Malformed (missing closing invoke tag)
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </minimax:tool_call>
    tools:
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      normal_text: ''
  PARSER.batch.5:
    description: Missing </minimax:tool_call> end marker
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
    tools:
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      normal_text: ''
  PARSER.batch.6:
    description: Empty args (no-arg call)
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_time">
      </invoke>
      </minimax:tool_call>
    tools:
    - name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      calls:
      - name: get_time
        arguments: {}
      normal_text: ''
  PARSER.batch.7:
    description: Complex args (multi-parameter)
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      <parameter name="unit">fahrenheit</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
          unit:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
          unit: fahrenheit
      normal_text: ''
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id001
    expected:
      calls: []
      normal_text: ''
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      <invoke name="get_weather">
      <parameter name="location">LA</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_weather
        arguments:
          location: LA
      normal_text: ''
