family: qwen3_coder
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      normal_text: ''
  PARSER.batch.2:
    description: Multiple tool calls
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
      <tool_call>
      <function=get_time>
      <parameter=timezone>
      EST
      </parameter>
      </function>
      </tool_call>
    tools:
    - *id001
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_time
        arguments:
          timezone: EST
      normal_text: ''
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      calls: []
      normal_text: Hello, how can I help you today?
  PARSER.batch.4:
    description: Malformed (missing </parameter> closing tag)
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </function>
      </tool_call>
    tools:
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      normal_text: ''
  PARSER.batch.5:
    description: Missing </tool_call> end marker
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
    tools:
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      normal_text: ''
  PARSER.batch.6:
    description: Empty args (no-arg call)
    model_text: |-
      <tool_call>
      <function=get_time>
      </function>
      </tool_call>
    tools:
    - name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      calls:
      - name: get_time
        arguments: {}
      normal_text: ''
  PARSER.batch.7:
    description: Complex args (multi-parameter)
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      <parameter=unit>
      fahrenheit
      </parameter>
      </function>
      </tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
          unit:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
          unit: fahrenheit
      normal_text: ''
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id001
    expected:
      calls: []
      normal_text: ''
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
      <tool_call>
      <function=get_weather>
      <parameter=location>
      LA
      </parameter>
      </function>
      </tool_call>
    tools:
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_weather
        arguments:
          location: LA
      normal_text: ''
