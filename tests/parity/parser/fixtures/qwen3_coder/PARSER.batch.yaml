family: qwen3_coder
model_label: Qwen 3 Coder
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang: *id001
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id003
      sglang: *id003
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls: []
        normal_text: ''
      vllm: *id004
      sglang: *id004
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      NYC
      </parameter>
      </function>
      </tool_call>
      <tool_call>
      <function=get_weather>
      <parameter=location>
      LA
      </parameter>
      </function>
      </tool_call>
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id005
      sglang: *id005
  PARSER.batch.11:
    description: Separator-character case — n/a for this family's syntax
    reason: |-
      PARSER.batch.11 targets delimiter-separated parser formats. qwen3_coder uses XML-ish function/parameter tags rather than delimiter-splitting call bodies, so generic string-value coverage remains in PARSER.batch.7.b.
  PARSER.batch.12:
    description: Multi-call separator-character case — n/a for this family's syntax
    reason: |-
      PARSER.batch.11 targets delimiter-separated parser formats. qwen3_coder uses XML-ish function/parameter tags rather than delimiter-splitting call bodies, so generic string-value coverage remains in PARSER.batch.7.b. PARSER.batch.12 is the multi-call version of the same separator-state check, so the same applicability rule applies.
  PARSER.batch.13:
    description: Unknown tool name absent from supplied tools
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=unknown_tool>
      <parameter=location>NYC</parameter>
      </function>
      </tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      sglang:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
