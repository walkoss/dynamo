family: jamba
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}]</tool_calls>'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      normal_text: ''
  PARSER.batch.2:
    description: Multiple tool calls (parallel)
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_time", "arguments":
      {"timezone": "EST"}}]</tool_calls>'
    tools:
    - *id001
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_time
        arguments:
          timezone: EST
      normal_text: ''
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      calls: []
      normal_text: Hello, how can I help you today?
  PARSER.batch.4:
    description: Malformed JSON args (missing close brace)
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"]</tool_calls>'
    tools:
    - *id001
    expected:
      calls: []
      normal_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"]</tool_calls>'
  PARSER.batch.5:
    description: Missing </tool_calls> end marker
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}]'
    tools:
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      normal_text: ''
  PARSER.batch.6:
    description: Empty args (no-arg call)
    model_text: '<tool_calls>[{"name": "get_time", "arguments": {}}]</tool_calls>'
    tools:
    - name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      calls:
      - name: get_time
        arguments: {}
      normal_text: ''
  PARSER.batch.7:
    description: Complex args (nested object + array)
    model_text: '<tool_calls>[{"name": "process_data", "arguments": {"items": [1, 2, 3], "config": {"nested": true}}}]</tool_calls>'
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          items:
            type: array
          config:
            type: object
    expected:
      calls:
      - name: process_data
        arguments:
          items:
          - 1
          - 2
          - 3
          config:
            nested: true
      normal_text: ''
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id001
    expected:
      calls: []
      normal_text: ''
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_weather", "arguments":
      {"location": "LA"}}]</tool_calls>'
    tools:
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_weather
        arguments:
          location: LA
      normal_text: ''
