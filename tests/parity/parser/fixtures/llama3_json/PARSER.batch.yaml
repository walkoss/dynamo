family: llama3_json
model_label: Llama 3 (JSON fmt)
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang: *id001
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id004
      sglang: *id004
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls: []
        normal_text: ''
      vllm: *id005
      sglang: *id005
  PARSER.batch.10:
    description: Duplicate calls (same name twice, semicolon-separated)
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_weather", "arguments":
      {"location": "LA"}}'
    tools:
    - *id002
    expected:
      dynamo: &id006
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id006
      sglang: *id006
  PARSER.batch.11:
    description: Single call with semicolon inside argument string value
    ref: dynamo
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "SELECT a; SELECT b"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo: &id007
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        normal_text: ''
      vllm: *id007
      sglang: *id007
  PARSER.batch.12:
    description: Parallel calls where one argument contains a semicolon (streaming split safety)
    ref: dynamo
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "SELECT a; SELECT b"}};{"name": "get_time", "arguments":
      {"timezone": "EST"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &id008
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *id008
      sglang: *id008
  PARSER.batch.13:
    description: Unknown tool name absent from supplied tools
    ref: originated from https://github.com/sgl-project/sglang/blob/612785ffdcaf35552f1ed433a981d596ca9fe900/test/registered/unit/function_call/test_unknown_tool_name.py#L29
    model_text: '<|python_tag|>{"name": "unknown_tool", "arguments": {"location": "NYC"}}'
    tools:
    - *id002
    expected:
      dynamo: &d_13
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm: *d_13
      sglang:
        calls: []
        normal_text: ''
        reason: SGLang drops unknown tool names by default unless SGLANG_FORWARD_UNKNOWN_TOOLS is enabled.
