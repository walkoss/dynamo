family: phi4
model_label: Phi-4
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"}}]'
    tools:
    - &id002
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &id001
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *id001
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id002
    expected:
      dynamo: &id003
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *id003
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id002
    expected:
      dynamo: &id004
        calls: []
        normal_text: ''
      vllm: *id004
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_weather", "arguments":
      {"location": "LA"}}]'
    tools:
    - *id002
    expected:
      dynamo: &id005
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *id005
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.11:
    description: Single JSON-array call with comma inside argument string value
    model_text: 'functools[{"name": "run_query", "arguments": {"sql": "SELECT a, SELECT b"}}]'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo: &d_11
        calls:
        - name: run_query
          arguments:
            sql: SELECT a, SELECT b
        normal_text: ''
      vllm: *d_11
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.12:
    description: Parallel JSON-array calls where one argument contains a comma
    model_text: 'functools[{"name": "run_query", "arguments": {"sql": "SELECT a, SELECT b"}}, {"name": "get_time", "arguments": {"timezone": "EST"}}]'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_12
        calls:
        - name: run_query
          arguments:
            sql: SELECT a, SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_12
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.13:
    description: Unknown tool name absent from supplied tools
    model_text: 'functools[{"name": "unknown_tool", "arguments": {"location": "NYC"}}]'
    tools:
    - *id002
    expected:
      dynamo: &d_13
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm: *d_13
      sglang:
        unavailable: SGLang has no detector for family='phi4'
